name: Publish CAP Pro to npm (with provenance)

# Triggers on any push to main that touches package.json. The "Check if version
# changed" step is the actual gate — it compares the local version to whatever
# is published under the package name from package.json (cap-pro). If they
# differ, we publish; otherwise we skip. This means: bump the version in
# package.json, push to main, GitHub Actions does the rest.

on:
  push:
    branches: [main]
    paths:
      - 'package.json'
  workflow_dispatch: {}

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write    # For git tagging
      id-token: write    # For npm provenance attestation (OIDC)
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Check if version changed
        id: version
        run: |
          LOCAL=$(node -p "require('./package.json').version")
          NAME=$(node -p "require('./package.json').name")
          PUBLISHED=$(npm view "$NAME" version 2>/dev/null || echo "0.0.0")
          echo "local=$LOCAL" >> "$GITHUB_OUTPUT"
          echo "published=$PUBLISHED" >> "$GITHUB_OUTPUT"
          echo "name=$NAME" >> "$GITHUB_OUTPUT"
          if [ "$LOCAL" != "$PUBLISHED" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Version changed: $NAME@$PUBLISHED -> $NAME@$LOCAL"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Version unchanged ($NAME@$LOCAL), skipping publish."
          fi

      - name: Install dev dependencies (locked)
        if: steps.version.outputs.changed == 'true'
        run: npm ci --ignore-scripts

      - name: Build hooks
        if: steps.version.outputs.changed == 'true'
        run: npm run build:hooks

      - name: Publish with provenance
        if: steps.version.outputs.changed == 'true'
        run: npm publish --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Tag release
        if: steps.version.outputs.changed == 'true'
        run: |
          VERSION="v${{ steps.version.outputs.local }}"
          # Skip if tag already exists (e.g. pushed manually before publish workflow ran)
          if git ls-remote --tags origin "$VERSION" | grep -q "$VERSION"; then
            echo "Tag $VERSION already exists on remote, skipping."
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag -a "$VERSION" -m "$VERSION — auto-published from main"
            git push origin "$VERSION"
          fi
