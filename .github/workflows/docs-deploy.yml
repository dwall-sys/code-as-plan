name: Deploy CAP Pro docs to GitHub Pages

# Builds the VitePress site under docs-site/ and deploys it to GitHub Pages.
# Triggers on:
#   - Pushes to main that touch docs-site/** or this workflow itself
#   - Manual dispatch (so you can re-deploy without a code change)
#
# One-time setup in the repo: Settings → Pages → "Build and deployment" → Source: GitHub Actions.

on:
  push:
    branches: [main]
    paths:
      - 'docs-site/**'
      - '.github/workflows/docs-deploy.yml'
      - 'package.json'
  workflow_dispatch: {}

# GitHub Pages permissions
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deploy. Cancel in-progress runs queued behind this.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build VitePress site
        run: npm run docs:build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs-site/.vitepress/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
